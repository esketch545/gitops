apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-go-gopher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-go-gopher
  template:
    metadata:
      labels:
        app: my-go-gopher
    spec:
      containers:
        - name: my-go-gopher
          image: esketch545/my-go-gopher:sha-c2db5f1612e85ccec3d9e23b536cb3402e726e61
          ports:
            - containerPort: 8080