apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-go-gopher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-go-gopher
  template:
    metadata:
      labels:
        app: my-go-gopher
    spec:
      containers:
        - name: my-go-gopher
          image: esketch545/my-go-gopher:sha-9dac2b5b4644e99629605f946417d5c2be10538f
          ports:
            - containerPort: 8080