apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-go-gopher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-go-gopher
  template:
    metadata:
      labels:
        app: my-go-gopher
    spec:
      containers:
        - name: my-go-gopher
          image: esketch545/my-go-gopher:sha-26d3b2a6797f0f00212a6d0479b6ec1cd860039f
          ports:
            - containerPort: 8080